version: '3.8'  # Добавьте эту строку в начало

services:
  promocodefactory.webhost:
    image: promocodefactorywebhost
    build:
      context: .
      dockerfile: PromoCodeFactory.WebHost/Dockerfile
    ports:
      - target: 80
        published: 5000
        protocol: tcp
    depends_on:
      postgres:
        condition: service_healthy  # Добавьте условие здоровья

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: HomeworkDockerDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:  # Добавьте healthcheck для postgres
      test: ["CMD-SHELL", "pg_isready -U postgres -d HomeworkDockerDb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
